name: Build VIRE APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Windows line endings
        run: |
          sed -i 's/\r//' gradlew
          sed -i 's/\r//' gradle.properties
          sed -i 's/\r//' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VIRE-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
